<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script src="asset/account/account.js" defer></script>
  <script src="asset/account/cashbook.js" defer></script>

  <link rel="stylesheet" href="asset/account/account.css">

</head>

<body class="flex h-screen overflow-hidden">

  <!-- ================= SIDEBAR ================= -->
  <div id="sidebar" class="w-64 bg-[#0f1b2e] p-4 flex flex-col">

    <h1 class="text-xl font-bold mb-3">Ledger App</h1>

    <!-- ENV -->
    <div class="flex items-center gap-2 mb-3">
      <span class="text-xs">TEST</span>
      <label class="switch">
        <input type="checkbox" id="envToggle">
        <span class="slider"></span>
      </label>
      <span class="text-xs">LIVE</span>
    </div>

    <!-- BUSINESS -->
    <select id="businessSelect" class="w-full p-2 bg-black mb-2"></select>
    <button onclick="openBusinessModal()" class="bg-green-600 p-2 mb-3">+ Business</button>

    <!-- MENU -->
    <button onclick="openCustomers()" class="p-2 bg-blue-600 rounded mb-2">Customers</button>
    <button onclick="openCashbook()" class="p-2 mb-2">Cashbook</button>
    <button onclick="openSettings()" class="p-2">Settings</button>

  </div>

  <!-- ================= MAIN ================= -->
  <div class="flex flex-1">

    <!-- CUSTOMER LIST -->
    <!-- LEFT PANEL -->
    <div id="leftPanel" class="w-1/3 border-r border-gray-700 flex flex-col">

      <!-- ================= CUSTOMERS ================= -->
      <div id="customersSection" class="flex flex-col h-full">

        <div class="p-3 border-b border-gray-700 flex justify-between">
          <span>Customers</span>
          <button onclick="openAddCustomer()" class="bg-blue-600 px-3 py-1">+</button>
        </div>

        <div id="dropZone" class="border-2 border-dashed border-gray-500 p-4 text-center rounded mb-2 cursor-pointer">
          📂 Drag & Drop Excel Here or Click to Upload
        </div>

        <button onclick="document.getElementById('excelFile').click()" class="border px-3 py-2 rounded">
          + Bulk Upload
        </button>

        <button onclick="downloadSampleExcel()" class="border px-3 py-2 rounded bg-green-600 text-white">
          ⬇ Download Sample
        </button>

        <input type="file" id="excelFile" hidden />

        <input id="searchBox" placeholder="Search name or phone" class="w-full p-2 bg-black mt-2">

        <div id="customerList" class="flex-1 overflow-auto"></div>

      </div>

      <!-- ================= CASHBOOK ================= -->
      <div id="cashbookSection" class="hidden flex flex-col h-full">

<div class="p-3 border-b border-gray-700 flex justify-between">
  <span>💰 Cashbook</span>
  <button onclick="openAddAccount()" class="bg-blue-600 px-3 py-1 rounded">+</button>
</div>

        <div id="cashbookList" class="flex-1 overflow-auto"></div>

      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div id="rightPanel" class="flex-1 flex flex-col h-full">
      Select customer
    </div>

  </div>

  <!-- ================= MODAL ================= -->
  <div id="modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden
         flex items-center justify-center z-[9999]">
  </div>




  <div class="fab md:hidden" onclick="toggleSidebar()">☰</div>

  <div id="toast" class="fixed bottom-5 right-5 hidden z-[9999]">
    <div id="toastMsg" class="px-4 py-3 rounded-lg shadow-lg text-white bg-black/80 backdrop-blur">
    </div>
  </div>

  <script>
    function showToast(msg, type = "success") {

      const toast = document.getElementById("toast");
      const box = document.getElementById("toastMsg");

      box.innerText = msg;

      box.className = `
    px-4 py-3 rounded-lg shadow-lg text-white backdrop-blur
    ${type === "error" ? "bg-red-600/90" : "bg-green-600/90"}
  `;

      toast.classList.remove("hidden");

      setTimeout(() => {
        toast.classList.add("hidden");
      }, 2000);
    }
  </script>




  </script>


  <div id="uploadModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50">
    <div class="bg-gray-900 p-6 rounded-2xl w-80 text-center">

      <h3 class="text-lg font-bold mb-3">Uploading Customers</h3>

      <div class="w-full bg-gray-700 rounded-full h-3 mb-3">
        <div id="uploadBar" class="bg-green-500 h-3 rounded-full" style="width:0%"></div>
      </div>

      <p id="uploadText" class="text-sm text-gray-300 mb-2">Starting...</p>

      <p id="uploadCount" class="text-xs text-gray-400">0 / 0</p>

    </div>
  </div>


  <div id="previewModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50">
    <div class="bg-gray-900 p-5 rounded-xl w-[90%] max-w-3xl">

      <h3 class="text-lg font-bold mb-3">Preview Upload</h3>

      <div class="max-h-80 overflow-auto border border-gray-700">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-800">
              <th class="p-2">Name</th>
              <th class="p-2">Phone</th>
              <th class="p-2">Status</th>
            </tr>
          </thead>
          <tbody id="previewTable"></tbody>
        </table>
      </div>

      <div class="flex justify-end gap-2 mt-4">
        <button onclick="closePreview()" class="bg-gray-600 px-4 py-2 rounded">Cancel</button>
        <button onclick="confirmUpload()" class="bg-green-600 px-4 py-2 rounded">Upload</button>
      </div>

    </div>
  </div>

</body>

</html>
